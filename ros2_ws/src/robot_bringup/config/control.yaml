# Controller configuration
line_follow_controller_node:
  ros__parameters:
    # Control rate
    control_rate_hz: 50.0

    # PD gains for lateral error
    kp_lateral: 2.0
    kd_lateral: 0.25

    # PD gains for heading error
    kp_heading: 1.8
    kd_heading: 0.20

    # Speed limits (m/s)
    base_speed_mps: 0.25
    max_lin_vel_mps: 0.4
    min_lin_vel_mps: 0.05

    # Angular velocity limits (rad/s)
    max_ang_vel_rps: 1.6

    # Lost line timeout (seconds)
    lost_line_timeout_s: 2.0

    # Reacquire behavior (when line briefly leaves FOV)
    reacquire_lin_vel_mps: 0.06
    reacquire_ang_vel_rps: 1.4
    reacquire_heading_deadband_rad: 0.05
    reacquire_lateral_deadband_m: 0.01

    # Turn mode: commit to a corner and ride it smoothly
    turn_enter_heading_rad: 0.28
    turn_enter_confirm_s: 0.10
    turn_exit_heading_rad: 0.2
    turn_exit_confirm_s: 0.12
    turn_max_time_s: 1.5
    turn_blind_duration_s: 1.2
    turn_lin_vel_mps: 0.10
    turn_omega_rps: 1.4

speed_profile_node:
  ros__parameters:
    # Speed limits
    v_max: 0.6
    v_min: 0.06

    # Acceleration limits (m/s^2)
    a_max: 0.5

    # Angular acceleration limit (rad/s^2)
    alpha_max: 3.0

    # Slowdown gains based on path geometry
    curvature_slowdown_gain: 0.45
    error_slowdown_gain: 0.7
    heading_slowdown_gain: 0.7

    # Control rate
    rate_hz: 50.0

safety_stop_node:
  ros__parameters:
    # Watchdog timeout for command velocity (seconds)
    cmd_vel_timeout_s: 0.5

    # Watchdog timeout for hardware status (seconds)
    hw_status_timeout_s: 1.0

    # Minimum battery voltage threshold (0 = disabled, no voltage divider wired)
    min_battery_v: 0.0

    # Rate to publish safety status
    rate_hz: 20.0
