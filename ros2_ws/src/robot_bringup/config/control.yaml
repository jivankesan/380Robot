# Controller configuration
line_follow_controller_node:
  ros__parameters:
    # Control rate
    control_rate_hz: 100.0

    # PD gains for lateral error
    kp_lateral: 6.5
    kd_lateral: 1.8

    # PD gains for heading error
    kp_heading: 4.2
    kd_heading: 1.6

    # Speed limits (m/s)
    base_speed_mps: 0.50
    max_lin_vel_mps: 0.70
    min_lin_vel_mps: 0.08

    # Angular velocity limits (rad/s)
    max_ang_vel_rps: 1.6

    # Turn speed reduction: v = base_speed - turn_speed_gain * abs(omega)
    # Higher gain = more slowdown on turns. min_turn_speed_mps is the floor.
    turn_speed_gain: 2.5
    min_turn_speed_mps: 0.14
    turn_omega_deadband_rps: 0.05

    # Lost line timeout (seconds)
    lost_line_timeout_s: 2.0

speed_profile_node:
  ros__parameters:
    # Speed limits
    v_max: 0.5
    v_min: 0.1

    # Acceleration limits (m/s^2)
    a_max: 0.5

    # Angular acceleration limit (rad/s^2)
    alpha_max: 2.0

    # Slowdown gains based on path geometry
    curvature_slowdown_gain: 0.3
    error_slowdown_gain: 0.5
    heading_slowdown_gain: 0.5

    # Control rate
    rate_hz: 58.0

safety_stop_node:
  ros__parameters:
    # Watchdog timeout for command velocity (seconds)
    cmd_vel_timeout_s: 0.5

    # Watchdog timeout for hardware status (seconds)
    hw_status_timeout_s: 1.0

    # Minimum battery voltage threshold (0 = disabled, no voltage divider wired)
    min_battery_v: 0.0

    # Rate to publish safety status
    rate_hz: 20.0
