# Task FSM configuration
task_fsm_node:
  ros__parameters:
    # Target object settings
    target_class: "blue_circle"
    detection_confidence_threshold: 0.5

    # Approach behaviour (APPROACH_TARGET state)
    # Linear speed while driving toward the circle
    approach_linear_speed_mps: 0.20
    # P gain: angular = -kp * (cx - 0.5)
    approach_kp_angular: 1.0
    approach_max_ang_vel_rps: 0.4
    # |top_y - 0.5| < this  (top_y = cy - h/2, normalised)
    approach_top_tolerance_y: 0.05
    # |cx - 0.5| < this
    approach_center_tolerance_x: 0.20
    # Robot only drives forward once |cx - 0.5| is within this.
    # Keeps the circle from drifting off-frame while approaching off-axis.
    approach_align_gate_x: 0.10
    # Publish zero cmd_vel if circle unseen for longer than this
    approach_detection_timeout_s: 0.5
    # Circle must fill at least this fraction of frame height before pickup triggers
    approach_min_circle_h: 0.50

    # Pickup timing (seconds)
    pickup_close_time_s: 1.0
    pickup_rotate_time_s: 1.0
    pickup_spin_time_s: 1.4
    pickup_spin_omega_rps: 1.5

    # Drop timing (seconds)
    drop_open_time_s: 1.0

    # Return detection (for drop zone)
    drop_zone_marker_class: "drop_zone"
    use_time_based_return: false
    return_time_s: 10.0

    # Minimum time to stay in APPROACH_TARGET before falling back to search
    min_approach_dwell_s: 2.0

    # Set false to skip line following entirely (circle-only test mode).
    # Robot will sit still until the blue circle is detected, then approach.
    require_line_follow: true

    # Line loss handling
    line_loss_timeout_s: 3.0

    # State machine rate
    rate_hz: 20.0

    # Initial state
    initial_state: "INIT"
