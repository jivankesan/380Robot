# Task FSM configuration
task_fsm_node:
  ros__parameters:
    # Target object settings
    target_class: "blue_circle"
    detection_confidence_threshold: 0.45

    # Detection stability (frames before transition)
    # Fewer frames needed — circle is large and easy to lock onto
    detection_stability_frames: 8

    # Target centering tolerance (normalized, 0-1 from center)
    target_center_tolerance_x: 0.15
    target_center_tolerance_y: 0.25

    # Target size threshold for "close enough" (normalized width).
    # Circle needs to fill ~40% of frame width before pickup.
    target_size_close_threshold: 0.40

    # Pickup timing (seconds)
    # stop_dwell: wait this long for motors to coast to zero before closing claw
    pickup_stop_dwell_s: 0.4
    pickup_close_time_s: 1.0
    pickup_hold_time_s: 0.5

    # Drop timing (seconds)
    drop_open_time_s: 1.0

    # Return detection (for drop zone)
    drop_zone_marker_class: "drop_zone"
    use_time_based_return: true
    return_time_s: 10.0

    # Minimum time to stay in APPROACH_TARGET before falling back to search
    min_approach_dwell_s: 2.0

    # Minimum time to stay in INIT before mission can start.
    # Arduino resets when the serial port opens (DTR), takes ~1 s to boot.
    # This ensures the claw-open command is sent and received before moving on.
    min_init_dwell_s: 1.5

    # Line loss handling
    line_loss_timeout_s: 0.5

    # State machine rate
    rate_hz: 20.0

    # Initial state
    initial_state: "INIT"
