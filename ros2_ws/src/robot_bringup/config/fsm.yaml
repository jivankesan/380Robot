# Task FSM configuration
task_fsm_node:
  ros__parameters:
    # ── Pickup target (blue circle) ──────────────────────────────────────────
    target_class: "blue_circle"
    detection_confidence_threshold: 0.45
    detection_stability_frames: 8
    target_center_tolerance_x: 0.20

    # When to stop the approach and begin pickup.
    # cy is normalized 0 (top) to 1 (bottom of frame).
    # Increase this value to stop farther away; decrease to get closer.
    # Start with 0.62 and adjust 0.05 at a time based on where the robot stops.
    approach_stop_cy: 0.45

    # ── Pickup sequence timing (seconds) ────────────────────────────────────
    pickup_stop_dwell_s: 0.4    # publish zero velocity for this long
    pickup_close_time_s: 1.0    # time to close gripper (servo 2)
    pickup_rotate_time_s: 0.5   # time to rotate claw to carry (servo 1)

    # ── Spin after pickup ────────────────────────────────────────────────────
    # Positive omega = left turn, negative = right turn.
    turn_around_omega_rps: 1.5
    turn_around_time_s: 4.2

    # ── Drop target (green box) ──────────────────────────────────────────────
    drop_target_class: "green_box"
    drop_center_tolerance_x: 0.15
    # Green box must fill this fraction of frame before triggering drop.
    drop_size_threshold: 0.30
    drop_detection_stability_frames: 5

    # ── Drop sequence timing (seconds) ──────────────────────────────────────
    drop_rotate_time_s: 0.5   # rotate claw to horizontal before opening
    drop_open_time_s: 1.0     # time to open gripper

    # ── Reverse onto red line after drop ────────────────────────────────────
    reverse_time_s: 2.0
    reverse_speed_mps: 0.15

    # ── Follow line home after reversal ─────────────────────────────────────
    return_home_time_s: 8.0

    # ── Fallback: drop after this many seconds if green box not found ────────
    use_time_based_return: true
    return_time_s: 12.0

    # ── Approach dwell before falling back to search ─────────────────────────
    min_approach_dwell_s: 2.0

    # ── Init dwell (Arduino boot time) ──────────────────────────────────────
    min_init_dwell_s: 1.5

    # ── Line loss warning threshold ──────────────────────────────────────────
    line_loss_timeout_s: 0.5

    # ── State machine rate ───────────────────────────────────────────────────
    rate_hz: 20.0
