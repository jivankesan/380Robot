# Hardware interface configuration
serial_bridge_node:
  ros__parameters:
    # Serial port settings
    serial_port: "/dev/ttyUSB0"
    baudrate: 115200

    # Robot geometry
    wheel_base_m: 0.15
    wheel_radius_m: 0.048

    # PWM limits
    max_pwm: 100

    # Command rate (Hz)
    cmd_rate_hz: 50.0

    # Watchdog timeout (ms)
    watchdog_timeout_ms: 250

    # Telemetry parsing
    telemetry_rate_hz: 20.0

    # Motor calibration: reduce the gain of the FASTER wheel until both spin
    # at the same rate on a straight command. Typical range: 0.80 - 1.0.
    # Example: if the left wheel is faster, set left_motor_gain to ~0.85.
    left_motor_gain: 1.0
    right_motor_gain: 1.0

    # Reverse motor direction if needed
    left_motor_reversed: false
    right_motor_reversed: false

    # Claw servo settings (matching demo.py)
    claw_servo_num: 2
    claw_open_angle: 90
    claw_close_angle: 150
