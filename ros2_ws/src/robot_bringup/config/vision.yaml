# Vision pipeline configuration
line_detector_node:
  ros__parameters:
    # ROI settings (fraction of image height/width)
    # Tune roi_y_start/end to focus on the lookahead strip.
    # Avoid the very bottom (robot body) and very top (horizon/walls).
    roi_y_start: 0.55
    roi_y_end: 0.95
    roi_x_start: 0.1
    roi_x_end: 0.9

    # HSV range 1 - lower red (H=0-10)
    line_h_min: 0
    line_h_max: 10
    line_s_min: 100
    line_s_max: 255
    line_v_min: 100
    line_v_max: 255
    # HSV range 2 - upper red (wrap-around, H=160-180)
    line_h2_min: 160
    line_h2_max: 180

    # Minimum detected mask area to count as a valid line (pixels^2).
    # Increase if you get false positives; decrease if line is thin/far.
    min_mask_area_px: 500

    # Camera mounting offset in pixels.
    # If the robot consistently drifts left, set a positive value (~+10 to +30).
    # If it drifts right, set a negative value. 0 = camera centred on robot.
    center_x_offset_px: 0

    # Calibration: pixel error to metres. Tune alongside PID gains.
    # lateral_error_m = pixel_offset * pixels_to_m_scale
    pixels_to_m_scale: 0.001

    # Debug visualization (disable for lower CPU load)
    publish_debug_image: true

object_detector_node:
  ros__parameters:
    # Blue circle HSV range
    h_min: 100
    h_max: 130
    s_min: 150
    s_max: 255
    v_min: 50
    v_max: 255

    # Minimum contour area (px²) to reject noise
    min_area_px: 500

    # 4π·area/perimeter² — 1.0 is a perfect circle.
    # Lower than 0.75 to tolerate partial circles when the robot is close
    # and the circle edge is clipped by the frame border.
    circularity_threshold: 0.55

    # Circle edge must be this many pixels inside the frame border
    # to count as fully visible and trigger a hard stop
    frame_margin_px: 5

    # Detection rate
    detection_rate_hz: 30.0

blue_circle_controller_node:
  ros__parameters:
    target_class: "blue_circle"
    drop_class: "green_box"
    kp_angular: 1.0
    # Normal approach speed; drops to near speed when w >= near_w_threshold
    linear_speed_mps: 0.10
    linear_speed_near_mps: 0.12
    near_w_threshold: 0.70
    max_angular_rps: 0.7
    center_tolerance_x: 0.10
    detection_timeout_s: 0.5
    rate_hz: 20.0
