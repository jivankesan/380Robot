# Vision pipeline configuration
line_detector_node:
  ros__parameters:
    # ROI settings (fraction of image)
    roi_y_start: 0.5
    roi_y_end: 1.0
    roi_x_start: 0.1
    roi_x_end: 0.9

    # HSV range 1 - lower red (validated with actual camera + tape)
    line_h_min: 0
    line_h_max: 10
    line_s_min: 100
    line_s_max: 255
    line_v_min: 100
    line_v_max: 255
    # HSV range 2 - upper red (wrap-around)
    line_h2_min: 160
    line_h2_max: 180

    # Canny edge detection
    canny_low: 50
    canny_high: 150

    # HoughLinesP
    hough_threshold: 50
    hough_min_line_length: 50
    hough_max_line_gap: 10

    # Calibration: pixels to meters for lateral error
    pixels_to_m_scale: 0.001

    # Debug visualization
    publish_debug_image: true

object_detector_node:
  ros__parameters:
    # Detection type: "heuristic" or "yolo"
    detector_type: "heuristic"

    # Target class to detect
    target_class: "lego_person"

    # Confidence threshold
    confidence_threshold: 0.5

    # Heuristic detector settings (for LEGO person - typically yellow/red)
    heuristic_h_min: 15
    heuristic_h_max: 35
    heuristic_s_min: 100
    heuristic_s_max: 255
    heuristic_v_min: 100
    heuristic_v_max: 255
    heuristic_min_area: 200
    heuristic_max_area: 50000

    # YOLO settings (if using yolo detector)
    model_path: ""
    device: "cpu"

    # Rate limiting
    detection_rate_hz: 10.0
