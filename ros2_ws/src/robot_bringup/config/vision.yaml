# Vision pipeline configuration
line_detector_node:
  ros__parameters:
    # ROI settings (fraction of image height/width)
    # Tune roi_y_start/end to focus on the lookahead strip.
    # Avoid the very bottom (robot body) and very top (horizon/walls).
    roi_y_start: 0.45
    roi_y_end: 0.95
    roi_x_start: 0.1
    roi_x_end: 0.9

    # HSV range 1 - lower red (H=0-10)
    line_h_min: 0
    line_h_max: 10
    line_s_min: 100
    line_s_max: 255
    line_v_min: 100
    line_v_max: 255
    # HSV range 2 - upper red (wrap-around, H=160-180)
    line_h2_min: 160
    line_h2_max: 180

    # Minimum detected mask area to count as a valid line (pixels^2).
    # Increase if you get false positives; decrease if line is thin/far.
    min_mask_area_px: 500

    # Camera mounting offset in pixels.
    # If the robot consistently drifts left, set a positive value (~+10 to +30).
    # If it drifts right, set a negative value. 0 = camera centred on robot.
    center_x_offset_px: 0

    # Calibration: pixel error to metres. Tune alongside PID gains.
    # lateral_error_m = pixel_offset * pixels_to_m_scale
    pixels_to_m_scale: 0.001

    # Debug visualization (disable for lower CPU load)
    publish_debug_image: true

object_detector_node:
  ros__parameters:
    # Detection type: "heuristic" or "yolo"
    detector_type: "heuristic"

    # Target class to detect
    target_class: "blue_circle"

    # Confidence threshold
    confidence_threshold: 0.45

    # Blue circle HSV settings
    # Blue in HSV: H=[90,130], high saturation, any brightness
    heuristic_h_min: 90
    heuristic_h_max: 130
    heuristic_s_min: 100
    heuristic_s_max: 255
    heuristic_v_min: 50
    heuristic_v_max: 255
    heuristic_min_area: 800
    heuristic_max_area: 200000
    # Circularity: 1.0 = perfect circle, reject blobs below this
    heuristic_circularity_min: 0.4

    # Green box HSV settings
    # Tune these for your specific green box under your lighting conditions.
    # Green in HSV: H=[40-80], high saturation, mid-to-high value.
    green_h_min: 40
    green_h_max: 80
    green_s_min: 60
    green_s_max: 255
    green_v_min: 40
    green_v_max: 210
    green_min_area: 3000
    green_max_area: 200000

    # YOLO settings (if using yolo detector)
    model_path: ""
    device: "cpu"

    # Rate limiting
    detection_rate_hz: 15.0

blue_circle_controller_node:
  ros__parameters:
    target_class: "blue_circle"
    drop_class: "green_box"
    # Proportional gain for horizontal centering (angular_z = -kp * (cx - 0.5))
    kp_angular: 1.0
    linear_speed_mps: 0.08  # ~PWM 40, constant creep toward lego figure
    max_angular_rps: 0.7
    center_tolerance_x: 0.20
    # Stop publishing if no detection for this many seconds
    detection_timeout_s: 0.5
    rate_hz: 20.0
