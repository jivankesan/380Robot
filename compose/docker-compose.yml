services:
  robot-dev:
    build:
      context: ../docker
      dockerfile: Dockerfile
      args:
        ROS_DISTRO: ${ROS_DISTRO:-jazzy}
        UBUNTU_VERSION: ${UBUNTU_VERSION:-24.04}
        HOST_UID: ${HOST_UID:-1000}
        HOST_GID: ${HOST_GID:-1000}
    image: 380robot:${ROS_DISTRO:-jazzy}
    container_name: 380robot-dev
    hostname: robot-dev
    stdin_open: true
    tty: true

    # Use host networking on Linux for easy ROS discovery
    # On macOS/Windows, remove this and use default bridge networking
    network_mode: host

    volumes:
      # Bind mount the entire repository
      - ..:/workspaces/380Robot:cached
      # libcamera IPA modules and tuning files must be visible inside the container
      - /usr/share/libcamera:/usr/share/libcamera:ro
      - /usr/lib/libcamera:/usr/lib/libcamera:ro

    working_dir: /workspaces/380Robot/ros2_ws

    environment:
      - ROS_DISTRO=${ROS_DISTRO:-jazzy}
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - RMW_IMPLEMENTATION=${RMW_IMPLEMENTATION:-rmw_fastrtps_cpp}
      - DISPLAY=${DISPLAY:-}

    # Device passthrough for Pi Camera (libcamera) and serial
    devices:
      - /dev/video0:/dev/video0
      - /dev/media0:/dev/media0
      - /dev/media2:/dev/media2
      - /dev/ttyUSB0:/dev/ttyUSB0

    # Keep container running
    command: bash
